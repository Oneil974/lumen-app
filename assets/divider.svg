<svg xmlns="http://www.w3.org/2000/svg" width="700" height="4" viewBox="0 0 700 4" role="presentation">
  <!-- Dégradé aux couleurs par défaut de l'orbe Lumen -->
  <defs>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff54a3"/>
      <stop offset="25%" stop-color="#9961ff"/>
      <stop offset="50%" stop-color="#47a3ff"/>
      <stop offset="75%" stop-color="#61f2c7"/>
      <stop offset="100%" stop-color="#ff9e6b"/>
    </linearGradient>
  </defs>
  <rect width="700" height="4" rx="2" fill="url(#orb)"/>
</svg>
